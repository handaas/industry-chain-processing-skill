name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile industry-chain-processing/scripts/*.py
      - run: python -m json.tool industry-chain-processing/assets/config.example.json >/dev/null
      - run: python -m json.tool industry-chain-processing/assets/report.example.json >/dev/null
      - run: python -m json.tool industry-chain-processing/assets/policy-context.example.json >/dev/null
